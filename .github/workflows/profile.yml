name: profile

# Regenerates the auto-generated dashboard assets:
#   - lowlighter/metrics  -> github-metrics.svg (committed to main)
#   - pacman graph        -> pacman.svg / pacman-dark.svg (pushed to the output branch)
#   - 3D contributions    -> profile-3d-contrib/*.svg (committed to master)
on:
  schedule:
    - cron: "0 2 * * *"   # nightly at 02:00 UTC
  workflow_dispatch:        # manual run button
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  metrics:
    name: github metrics card
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          # Commit with GITHUB_TOKEN so the push does not re-trigger this workflow.
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          user: mayur-tolexo
          filename: github-metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_indepth: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_notable: yes
          plugin_notable_repositories: yes
          plugin_achievements: yes
          plugin_achievements_threshold: C
          committer_message: "chore: refresh github-metrics.svg"

  contrib-3d:
    name: 3D contribution calendar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: yoshi389111/github-profile-3d-contrib@latest
        env:
          GITHUB_TOKEN: ${{ secrets.METRICS_TOKEN }}
          USERNAME: mayur-tolexo
      - name: commit & push 3D contrib
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A profile-3d-contrib
          if git commit -m "chore: refresh 3D contribution calendar"; then
            git push
          fi

  pacman:
    name: pacman contribution graph
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: generate pacman SVGs
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: mayur-tolexo
          github_token: ${{ secrets.GITHUB_TOKEN }}
          games: pacman
      - name: push SVGs to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
